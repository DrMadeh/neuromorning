<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>د. مادح محمد جادو - استشاري طب المخ والأعصاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --deep-blue: #0d2147;
            --accent-teal: #00c9b1;
            --accent-gold: #d4a843;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--deep-blue) 100%);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .avatar-ring {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-gold));
            padding: 4px;
            box-shadow: 0 0 25px rgba(0, 201, 177, 0.3);
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: var(--navy);
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { font-size: 24px; margin-bottom: 8px; font-weight: 900; }
        .title { color: var(--accent-gold); font-size: 15px; margin-bottom: 25px; font-weight: 700; }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .social-link {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 12px 5px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .social-link:hover {
            background: var(--accent-teal);
            transform: translateY(-3px);
        }

        .clinic-card {
            background: rgba(255, 255, 255, 0.05);
            border-right: 4px solid var(--accent-teal);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: white;
        }

        .whatsapp-btn {
            display: block;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        .footer-text { margin-top: 20px; font-size: 12px; color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-ring">
            <div class="avatar-inner">
                <img src="https://raw.githubusercontent.com/DrMadeh/neuromorning/main/1767173976637.jpg" alt="د. مادح محمد جادو">
            </div>
        </div>

        <h1>د. مادح محمد جادو</h1>
        <p class="title">استشاري طب المخ والأعصاب والعمود الفقري</p>

        <div class="social-grid">
            <a href="https://facebook.com/share/1Ana4fLkYK" class="social-link">فيسبوك</a>
            <a href="https://youtube.com/@DrMadehNeuro" class="social-link">يوتيوب</a>
            <a href="https://tiktok.com/@drmadehneuro" class="social-link">تيك توك</a>
        </div>

        <a href="tel:01096907111" class="clinic-card">
            <span>📍 عيادة المنصورة</span>
            <strong>01096907111</strong>
        </a>
        <a href="tel:01096907444" class="clinic-card">
            <span>📍 عيادة بلقاس</span>
            <strong>01096907444</strong>
        </a>
        <a href="tel:01006761235" class="clinic-card">
            <span>📍 عيادة ديسط</span>
            <strong>01006761235</strong>
        </a>

        <a href="https://wa.me/201096907444" class="whatsapp-btn">💬 احجز كشف أونلاين (واتساب)</a>

        <p class="footer-text">استشاري مخ وأعصاب - الزمالة المصرية</p>
    </div>
</body>
</html>
